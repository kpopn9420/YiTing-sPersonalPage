<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人網頁</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 10px 0;
            text-align: center;
        }

        nav {
            background-color: #444;
            overflow: hidden;
        }

        nav a {
            float: left;
            display: block;
            color: white;
            padding: 14px 20px;
            text-align: center;
            text-decoration: none;
        }

        nav a:hover {
            background-color: #575757;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section h2 {
            color: #333;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>歡迎來到我的個人網站</h1>
        <p>探索我的經歷、作品與成就</p>
    </header>

    <nav>
        <a href="#about">關於我</a>
        <a href="#projects">作品</a>
        <a href="#achievements">成就</a>
        <a href="#contact">聯絡我</a>
    </nav>

    <div class="content">
        <section id="about" class="section">
            <h2>關於我</h2>
            <p>在這裡你可以寫一些關於自己的介紹，像是學歷、經歷等等。</p>
        </section>

        <section id="projects" class="section">
            <h2>作品</h2>
            <p>展示你的過去作品和項目，並附上描述。</p>
        </section>

        <section id="achievements" class="section">
            <h2>成就</h2>
            <p>列出你的各項成就或獲獎紀錄。</p>
        </section>

        <section id="contact" class="section">
            <h2>聯絡我</h2>
            <p>提供你的聯絡方式或社交媒體連結。</p>
        </section>
    </div>

    <footer>
        <p>© 2024 我的個人網站</p>
    </footer>

</body>
</html>
